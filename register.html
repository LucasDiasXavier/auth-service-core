<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Authentication System</title>
    <link rel="stylesheet" href="./styles/login.css">
    
</head>

<body>
    <div class="card">
        <header>

            <h1>Registro</h1>

        </header>

        <form id="register-form" autocomplete="off" novalidate>
            <div class="form-group">
                <label for="fullname">Nome Completo:</label>
                <input type="text" id="fullname" name="fullname" placeholder="Nome completo..." required>
                <small class="error-message" id="fullname-error">
                Por favor, insira um nome válido.
               </small>
            </div>
              <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Digite seu email..." autocomplete="email" required>
                <small class="error-message" id="email-error">
                Por favor, insira um e-mail válido.
               </small>
            </div>
             <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" placeholder="Insira sua senha..." autocomplete="current-password" required>
                <small class="error-message" id="password-error">
                Por favor, insira uma senha válida.
               </small>
            </div>
             <div class="form-group">
                <label for="confirm-password">Confirme sua senha:</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Insira sua senha..." autocomplete="current-password" required>
                <small class="error-message" id="confirm-password-error">
                Por favor, confirme sua senha.
               </small>
            </div>


            <button type="submit" id="btn-submit">Cadastrar</button>

            <footer>
                Já possui uma conta? <a href="login.html">Entrar</a>
        </form>
    </div>

    <script src="./scripts/registerValidation.js"></script>

</body>
</html>
