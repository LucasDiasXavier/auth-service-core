<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Authentication System</title>
    <link rel="stylesheet" href="./styles/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <div class="card">
        <header>

            <h1>Login</h1>

        </header>

        <form id="login-form" autocomplete="off" novalidate>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Digite seu email..." autocomplete="email" required>
                <small class="error-message">
                Por favor, insira um e-mail válido.
               </small>
            </div>

            <div class="form-group" >
                <label for="password">Senha:</label>

                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="Insira sua senha..." autocomplete="current-password" required>
                    <i class="fa-regular fa-eye" id="toggle-password" onclick="toggleSenha('password', 'toggle-password')"></i>
                </div>

                <small class="error-message" id="password-error">
                Por favor, insira uma senha válida.
               </small>
            </div>

            <button type="submit" id="login-btn">Entrar</button>

        </form>
          <footer>
                Não possui uma conta? <a href="register.html">Criar conta</a>
            </footer>
    </div>

    <script src="./scripts/loginValidation.js"></script>
</body>
</html>
