<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Authentication System</title>
    <link rel="stylesheet" href="./styles/login.css">
</head>

<body>
    <div class="card">
        <header>

            <h1>Login</h1>

        </header>

        <form id="login-form" autocomplete="off" novalidate>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Digite seu email..." required>
                <small class="error-message">
                Por favor, insira um e-mail válido.
               </small>
            </div>

            <div class="form-group" >
                <label for="password">Senha:</label>
                <input type="password" id="password" placeholder="Insira sua senha..." required>
                    <small class="error-message" id="password-error">
                Por favor, insira uma senha válida.
               </small>
            </div>

            <button type="submit" id="login-btn">Entrar</button>

            <footer>
                Não possui uma conta? <a href="register.html">Criar conta</a>
            </footer>
        </form>
    </div>

    <script src="./scripts/loginValidation.js"></script>
</body>
</html>
